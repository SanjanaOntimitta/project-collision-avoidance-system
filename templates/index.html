<!DOCTYPE html>
<html>
<head>
<title>Project Collision Avoidance System</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, #6a11cb, #2575fc);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    background: rgba(255,255,255,0.1);
    padding: 25px;
    border-radius: 15px;
    width: 400px;
    color: white;
}
textarea {
    width: 100%;
    height: 100px;
    border-radius: 10px;
    border: none;
    padding: 10px;
}
button {
    margin: 10px 5px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}
.result {
    margin-top: 15px;
    display: none;
}
</style>

</head>

<body>

<div class="container">

<h2>🚀 Project Collision Avoidance System</h2>

<textarea id="projectInput" placeholder="Enter Title + Description..."></textarea>

<p style="text-align:center;">OR</p>

<input type="file" id="fileInput" accept=".txt,.pdf">

<br>

<button onclick="checkSimilarity()">Check</button>
<button onclick="clearText()">Clear</button>

<div class="result" id="resultBox">
<div id="matchesBox"></div>
</div>

</div>

<script>

function clearText() {
    document.getElementById("projectInput").value = "";
    document.getElementById("fileInput").value = "";
    document.getElementById("resultBox").style.display = "none";
}

async function checkSimilarity() {
    let text = document.getElementById("projectInput").value;
    let file = document.getElementById("fileInput").files[0];

    if (text.trim() === "" && !file) {
        alert("Enter text OR upload a file!");
        return;
    }

    let formData = new FormData();

    if (text) formData.append("text", text);
    if (file) formData.append("file", file);

    let box = document.getElementById("resultBox");
    let matchesBox = document.getElementById("matchesBox");

    box.style.display = "block";
    matchesBox.innerHTML = "<p>⏳ Checking similarity...</p>";

    try {
        let response = await fetch("/check", {
            method: "POST",
            body: formData
        });

        let data = await response.json();

        if (!data.results || data.results.length === 0) {
            matchesBox.innerHTML = "<p>No similar projects found.</p>";
            return;
        }

        matchesBox.innerHTML = "<h3>🔍 Similar Projects Found:</h3>";

        data.results.forEach((item, index) => {
            let color = "green";
            if (item.similarity > 85) color = "red";
            else if (item.similarity >= 70) color = "orange";

            matchesBox.innerHTML += `
                <p>
                    ${index + 1}. <b>${item.title}</b><br>
                    &nbsp;&nbsp;&nbsp;Similarity: ${item.similarity}%<br>
                    &nbsp;&nbsp;&nbsp;Status: <span style="color:${color}">${item.status}</span>
                </p>
            `;
        });

    } catch (error) {
        matchesBox.innerHTML = "<p>❌ Server error. Try again.</p>";
    }
}

</script>

</body>
</html>
