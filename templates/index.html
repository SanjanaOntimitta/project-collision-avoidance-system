<!DOCTYPE html>
<html>
<head>
<title>Project Collision Avoidance System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
    🚀 Project Collision Avoidance System
</div>

<div class="container">

<h2>Submit Your Project</h2>

<textarea id="projectInput" placeholder="Enter project description..."></textarea>

<p style="text-align:center; margin:10px 0;">OR</p>

<input type="file" id="fileInput" accept=".txt,.pdf">

<div class="char-count" id="charCount">0 characters</div>

<div class="button-group">
<button onclick="checkSimilarity()">Check</button>
<button onclick="clearText()">Clear</button>
</div>

<div class="result" id="resultBox">
<h3 id="scoreText"></h3>

<div class="progress-bar">
<div class="progress" id="progressBar"></div>
</div>

<p id="statusText"></p>

<div id="matchesBox"></div>
</div>

</div>

<script>
// Character counter
document.getElementById("projectInput").addEventListener("input", function() {
let count = this.value.length;
document.getElementById("charCount").innerText = count + " characters";
});

// Clear
function clearText() {
document.getElementById("projectInput").value = "";
document.getElementById("fileInput").value = "";
document.getElementById("charCount").innerText = "0 characters";
document.getElementById("resultBox").style.display = "none";
}

// Main function
async function checkSimilarity() {
let text = document.getElementById("projectInput").value;
let file = document.getElementById("fileInput").files[0];

if (text.trim() === "" && !file) {
alert("Enter text OR upload a file!");
return;
}

let formData = new FormData();

if (file) {
formData.append("file", file);
} else {
formData.append("text", text);
}

try {
let response = await fetch("http://localhost:5000/check", {
method: "POST",
body: formData
});

let data = await response.json();

document.getElementById("resultBox").style.display = "block";

// Score
document.getElementById("scoreText").innerText =
"Similarity Score: " + data.score + "%";

let progressBar = document.getElementById("progressBar");
progressBar.style.width = data.score + "%";
progressBar.innerText = data.score + "%";

// Status
let statusText = document.getElementById("statusText");

if (data.score > 70) {
statusText.innerText = "⚠ High Collision Detected";
statusText.style.color = "#ff4d4d";
} else if (data.score > 40) {
statusText.innerText = "⚡ Moderate Similarity";
statusText.style.color = "#ffd633";
} else {
statusText.innerText = "✅ Unique Project";
statusText.style.color = "#00ff99";
}

// Matches
let matchesBox = document.getElementById("matchesBox");
matchesBox.innerHTML = "<h4>Similar Projects:</h4>";

data.matches.forEach(title => {
matchesBox.innerHTML += "<p>• " + title + "</p>";
});

} catch (error) {
alert("Server error");
console.log(error);
}
}
</script>

</body>
</html>
