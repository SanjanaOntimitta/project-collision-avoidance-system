<!DOCTYPE html>
<html>
<head>
<title>Project Collision Avoidance System</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, #6a11cb, #2575fc);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: rgba(255,255,255,0.1);
    padding: 25px;
    border-radius: 15px;
    width: 420px;
    color: white;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
}

textarea {
    width: 100%;
    height: 110px;
    border-radius: 10px;
    border: none;
    padding: 10px;
    font-size: 14px;
    resize: none;
}

input[type="file"] {
    margin-top: 10px;
    color: white;
}

button {
    margin: 10px 5px;
    padding: 10px 15px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    opacity: 0.9;
}

.result {
    margin-top: 15px;
    display: none;
    max-height: 300px;
    overflow-y: auto;
}

h2 {
    text-align: center;
}
</style>

</head>

<body>

<div class="container">

<h2>🚀 Project Collision Avoidance System</h2>

<textarea id="projectInput" placeholder="Enter Title + Description..."></textarea>

<p style="text-align:center;">AND</p>

<input type="file" id="fileInput" accept=".txt,.pdf">

<br>

<button onclick="checkSimilarity()">Check</button>
<button onclick="clearText()">Clear</button>

<div class="result" id="resultBox">
    <div id="matchesBox"></div>
</div>

</div>

<script>

function clearText() {
    document.getElementById("projectInput").value = "";
    document.getElementById("fileInput").value = "";
    document.getElementById("resultBox").style.display = "none";
    document.getElementById("matchesBox").innerHTML = "";
}

async function checkSimilarity() {
    let text = document.getElementById("projectInput").value.trim();
    let file = document.getElementById("fileInput").files[0];

    // 🔥 FIX: better validation
    if (!text && !file) {
        alert("Please enter text OR upload a file!");
        return;
    }

    let formData = new FormData();

    // 🔥 FIX: only send if exists
    if (text) formData.append("text", text);
    if (file) formData.append("file", file);

    let box = document.getElementById("resultBox");
    let matchesBox = document.getElementById("matchesBox");

    box.style.display = "block";
    matchesBox.innerHTML = "<p>⏳ Checking similarity...</p>";

    try {
        let response = await fetch("/check", {
            method: "POST",
            body: formData
        });

        let data = await response.json();

        if (!response.ok) {
            matchesBox.innerHTML = `<p>⚠️ ${data.message || "Unable to check similarity right now."}</p>`;
            return;
        }

        if (!data.results || data.results.length === 0) {
            matchesBox.innerHTML = `<p>⚠️ ${data.message || "No similar projects found. Try better input."}</p>`;
            return;
        }

        matchesBox.innerHTML = "<h3>🔍 Similar Projects Found:</h3>";

        data.results.forEach((item, index) => {

            let color = "lightgreen";
            if (item.similarity > 80) color = "red";
            else if (item.similarity >= 50) color = "orange";

            matchesBox.innerHTML += `
                <div style="margin-bottom:10px;">
                    <b>${index + 1}. ${item.title}</b><br>
                    Similarity: ${item.similarity}%<br>
                    Status: <span style="color:${color}; font-weight:bold;">
                        ${item.status}
                    </span>
                </div>
            `;
        });

    } catch (error) {
        matchesBox.innerHTML = "<p>❌ Server error. Try again.</p>";
        console.error(error);
    }
}

</script>

</body>
</html>
